name: Release extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify versions are consistent with the tag
        shell: bash
        run: |
          manifest_version="$(node -p "JSON.parse(require('fs').readFileSync('extension/manifest.json', 'utf8')).version")"
          package_version="$(node -p "require('./package.json').version")"
          test "$manifest_version" = "$package_version" || {
            echo "extension/manifest.json (${manifest_version}) and package.json (${package_version}) disagree" >&2
            exit 1
          }
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            test "${GITHUB_REF_NAME}" = "v${manifest_version}" || {
              echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${manifest_version}" >&2
              exit 1
            }
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run check

      - name: Package extension
        shell: bash
        run: |
          npm run build
          version="$(node -p "JSON.parse(require('fs').readFileSync('dist/manifest.json', 'utf8')).version")"
          mkdir -p release
          (
            cd dist
            zip -r "../release/sjtu-jaccount-captcha-${version}.zip" .
          )
          (
            cd release
            sha256sum *.zip > SHA256SUMS.txt
          )

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: sjtu-jaccount-captcha
          path: release/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/*.zip release/SHA256SUMS.txt --generate-notes --verify-tag
